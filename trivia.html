    <body>
        <h1>Byte-to-other-unit calculator</h1>

        <form id="byte-calc" style="white-space: pre-line">
            <label for="byte-count">Byte(s): </label>
            <input id="byte-count" name="byte-count" type="number" required>

            <label for="bytesel">Select which type of conversion you want to do:</label>
            <select name="bytetype" id="bytetype">
                <option value="bit">Bit</option>
                <option value="kilobyte">Kilobyte (KB)</option>
                <option value="megabyte">Megabyte (MB)</option>
                <option value="gigabyte">Gigabyte (GB)</option>
            </select> 

            <button type="onclick" onclick="byteCalculate()">Send</button>
        </form>

        <p id="converted-num"></p>
    </body>

    <script src="script.js"></script>
</html>
